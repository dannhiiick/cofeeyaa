services:
  - type: web
    name: cofeeyaa-backend
    runtime: python
    rootDir: backend
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate --no-input && python manage.py shell -c \"from django.contrib.auth.models import User; User.objects.exists() or __import__('subprocess').run(['python','manage.py','seed_data'],check=True)\""
    startCommand: "gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://dannhiiick.github.io"
      - key: PYTHON_VERSION
        value: "3.11.0"
